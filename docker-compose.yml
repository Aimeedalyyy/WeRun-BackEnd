services:
  # PostgreSQL Database Container
  db:
    image: postgres:17
    container_name: werun_postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: werun_db
      POSTGRES_USER: werun_user
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werun_user -d werun_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - app-network

  # Django Backend Container
  backend:
    build: 
      context: ./WeRun
      dockerfile: Dockerfile
    container_name: werun_backend
    restart: unless-stopped
    
    environment:
      DEBUG: "True"
      SECRET_KEY: "your-secret-key-here-change-in-production"

      # FIXED ALLOWED_HOSTS
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend,nginx"
      
      # FIXED DB PASSWORD
      DATABASE_URL: "postgresql://werun_user:password@db:5432/werun_db"
      
      DB_NAME: werun_db
      DB_USER: werun_user
      DB_PASSWORD: password
      DB_HOST: db
      DB_PORT: 5432
    
    ports:
      - "8000:8000"

    volumes:
      - ./WeRun:/app
      - media_files:/app/media
      - static_files:/app/static
    
    depends_on:
      db:
        condition: service_healthy
    
    command: >
      sh -c "python manage.py collectstatic --noinput --clear &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
      
    networks:
      - app-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: werun_nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - static_files:/static
      - media_files:/media
    
    depends_on:
      - backend
    
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local

networks:
  app-network:
    driver: bridge
